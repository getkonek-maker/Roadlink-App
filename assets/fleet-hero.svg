      <circle cx="78" cy="176" r="24" fill="#111827"/>
      <circle cx="78" cy="176" r="10" fill="#e5e7eb"/>
      <circle cx="256" cy="176" r="24" fill="#111827"/>
      <circle cx="256" cy="176" r="10" fill="#e5e7eb"/>
      <circle cx="338" cy="176" r="24" fill="#111827"/>
      <circle cx="338" cy="176" r="10" fill="#e5e7eb"/>
      <text x="46" y="145" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800">WING VAN</text>
