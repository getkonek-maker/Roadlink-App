<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">Roadlink 10-wheeler and wing van</title>
  <desc id="desc">A clean transport illustration showing Roadlink cargo vehicles on the road.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#f8faff"/>
      <stop offset="1" stop-color="#e7edff"/>
    </linearGradient>
    <linearGradient id="blueTruck" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#101a68"/>
      <stop offset="1" stop-color="#1428d4"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="720" height="420" rx="34" fill="url(#sky)"/>
  <path d="M0 330 C120 292 210 344 334 316 C470 286 565 308 720 268 L720 420 L0 420 Z" fill="#dfe7ff"/>
  <path d="M60 340 L660 340" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
  <path d="M110 340 L186 340 M268 340 L344 340 M426 340 L502 340 M584 340 L640 340" stroke="#9aa7d9" stroke-width="4" stroke-linecap="round"/>

  <g filter="url(#shadow)">
