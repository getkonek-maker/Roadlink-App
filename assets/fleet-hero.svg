      <rect x="58" y="66" width="220" height="10" rx="2" fill="#1428d4"/>
      <rect x="58" y="82" width="182" height="6" rx="2" fill="#e01f26"/>
      <path d="M294 72 L350 80 L374 122 L294 122 Z" fill="url(#blueTruck)"/>
      <rect x="314" y="87" width="32" height="20" rx="3" fill="#dbeafe"/>
      <rect x="20" y="118" width="372" height="16" rx="6" fill="#111827"/>
      <circle cx="86" cy="138" r="24" fill="#111827"/>
      <circle cx="86" cy="138" r="10" fill="#e5e7eb"/>
      <circle cx="304" cy="138" r="24" fill="#111827"/>
      <circle cx="304" cy="138" r="10" fill="#e5e7eb"/>
      <text x="72" y="110" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800">10 WHEELER</text>
    </g>

    <g transform="translate(312 70)">
      <rect x="20" y="78" width="276" height="82" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
      <path d="M20 98 L296 98 L268 118 L20 112 Z" fill="#1428d4"/>
      <path d="M20 90 L280 90 L254 104 L20 98 Z" fill="#e01f26"/>
      <path d="M296 108 L356 116 L382 160 L296 160 Z" fill="#101a68"/>
