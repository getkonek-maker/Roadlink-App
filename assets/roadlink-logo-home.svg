<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 118" role="img" aria-labelledby="title desc">
  <title id="title">Roadlink Cargo Transport Service</title>
  <desc id="desc">Roadlink wordmark with white service label and tagline for video backgrounds.</desc>
  <defs>
    <linearGradient id="metal" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.42" stop-color="#9ca3af"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <filter id="homeShadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="1.8" dy="2.4" stdDeviation="1.35" flood-color="#050816" flood-opacity="0.58"/>
    </filter>
  </defs>
  <g transform="translate(0 8)" filter="url(#homeShadow)">
    <text x="0" y="52" fill="url(#metal)" stroke="#15191d" stroke-width="3" paint-order="stroke fill" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="57" font-style="italic" letter-spacing="-3">Roadlink</text>
  </g>
  <text x="374" y="52" fill="#ffffff" filter="url(#homeShadow)" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="900" letter-spacing="0.2">CARGO TRANSPORT SERVICE</text>
  <path d="M4 66 L602 66 L549 87 L4 76 Z" fill="#1428d4"/>
  <path d="M4 60 L581 60 L532 74 L4 68 Z" fill="#e01f26"/>
  <text x="6" y="111" fill="#ffffff" filter="url(#homeShadow)" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="900">We Go Wherever Roads Go !</text>
</svg>
