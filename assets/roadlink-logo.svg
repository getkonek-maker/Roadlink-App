<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 118" role="img" aria-labelledby="title desc">
  <title id="title">Roadlink Cargo Transport Service</title>
  <desc id="desc">Roadlink wordmark with red and blue transport speed lines.</desc>
  <defs>
    <linearGradient id="metal" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#f6f7f8"/>
      <stop offset="0.45" stop-color="#8d939a"/>
      <stop offset="1" stop-color="#eef0f2"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="1.5" dy="2" stdDeviation="1.2" flood-color="#101418" flood-opacity="0.35"/>
    </filter>
  </defs>
  <g transform="translate(0 8)" filter="url(#softShadow)">
    <text x="0" y="52" fill="url(#metal)" stroke="#15191d" stroke-width="3" paint-order="stroke fill" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="57" font-style="italic" letter-spacing="-3">Roadlink</text>
  </g>
  <text x="384" y="52" fill="#15191d" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800" letter-spacing="0.4">CARGO TRANSPORT SERVICE</text>
  <path d="M4 66 L602 66 L549 87 L4 76 Z" fill="#1428d4"/>
  <path d="M4 60 L581 60 L532 74 L4 68 Z" fill="#e01f26"/>
  <text x="6" y="110" fill="#15191d" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800">We Go Wherever Roads Go !</text>
</svg>
